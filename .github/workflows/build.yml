name: Build ffmpeg (LGPL, universal macOS)

on:
  workflow_dispatch:
    inputs:
      ffmpeg_version:
        description: 'ffmpeg version to build (e.g. 7.1.1)'
        required: true
        default: '7.1.1'

jobs:
  build-and-release:
    name: Build universal + release
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Install build tools
        run: |
          brew install nasm lame
          # Also build lame for x86_64 cross-compile (brew gives arm64 on Apple Silicon runners)
          curl -fL "https://downloads.sourceforge.net/lame/lame-3.100.tar.gz" -o lame.tar.gz
          tar xf lame.tar.gz
          cd lame-3.100
          ./configure --host=x86_64-apple-darwin --prefix=/usr/local/lame-x86_64 \
            CC=clang CFLAGS="-arch x86_64" LDFLAGS="-arch x86_64" \
            --disable-shared --enable-static --disable-frontend
          make -j$(sysctl -n hw.ncpu)
          sudo make install

      - name: Download ffmpeg source
        run: |
          VERSION="${{ github.event.inputs.ffmpeg_version }}"
          curl -fL "https://ffmpeg.org/releases/ffmpeg-${VERSION}.tar.gz" -o ffmpeg.tar.gz
          tar xf ffmpeg.tar.gz
          mv "ffmpeg-${VERSION}" ffmpeg-src

      - name: Build arm64 (native)
        run: |
          cd ffmpeg-src
          LAME_PREFIX=$(brew --prefix lame)
          ./configure \
            --arch=arm64 \
            --disable-gpl \
            --disable-nonfree \
            --disable-autodetect \
            --enable-static \
            --disable-shared \
            --disable-ffplay \
            --disable-ffprobe \
            --disable-doc \
            --disable-debug \
            --enable-libmp3lame \
            --extra-cflags="-arch arm64 -I${LAME_PREFIX}/include" \
            --extra-ldflags="-arch arm64 -L${LAME_PREFIX}/lib"
          make -j$(sysctl -n hw.ncpu)
          cp ffmpeg ../ffmpeg_arm64
          strip ../ffmpeg_arm64
          file ../ffmpeg_arm64
          make distclean

      - name: Build x86_64 (cross-compile)
        run: |
          cd ffmpeg-src
          ./configure \
            --arch=x86_64 \
            --enable-cross-compile \
            --disable-gpl \
            --disable-nonfree \
            --disable-autodetect \
            --enable-static \
            --disable-shared \
            --disable-ffplay \
            --disable-ffprobe \
            --disable-doc \
            --disable-debug \
            --enable-libmp3lame \
            --extra-cflags="-arch x86_64 -I/usr/local/lame-x86_64/include" \
            --extra-ldflags="-arch x86_64 -L/usr/local/lame-x86_64/lib"
          make -j$(sysctl -n hw.ncpu)
          cp ffmpeg ../ffmpeg_x86_64
          strip ../ffmpeg_x86_64
          file ../ffmpeg_x86_64

      - name: Create universal binary
        run: |
          lipo -create ffmpeg_arm64 ffmpeg_x86_64 -output ffmpeg
          chmod +x ffmpeg
          lipo -info ffmpeg

      - name: Generate checksum
        run: |
          shasum -a 256 ffmpeg | awk '{print $1}' > ffmpeg.sha256
          echo "SHA256: $(cat ffmpeg.sha256)"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.event.inputs.ffmpeg_version }}"
          TAG="v${VERSION}"
          NOTES="ffmpeg ${VERSION} universal macOS binary (arm64 + x86_64). Built from https://ffmpeg.org/releases/ffmpeg-${VERSION}.tar.gz with --disable-gpl --disable-nonfree --disable-autodetect --enable-static --enable-libmp3lame. Licensed LGPLv2.1+."
          # Delete existing release + tag if present (allows re-running same version)
          gh release delete "$TAG" --repo "${{ github.repository }}" --yes 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          gh release create "$TAG" \
            ffmpeg \
            ffmpeg.sha256 \
            --repo "${{ github.repository }}" \
            --title "ffmpeg ${VERSION}" \
            --notes "$NOTES"

